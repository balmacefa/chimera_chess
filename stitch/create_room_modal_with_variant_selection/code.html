<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Room - Chimera Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2d00d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221f10",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-[960px] bg-white dark:bg-[#1a180d] rounded-xl shadow-2xl overflow-hidden border border-neutral-200 dark:border-neutral-800">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-neutral-200 dark:border-neutral-800 bg-neutral-50 dark:bg-[#232010]">
<h3 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Create New Room</h3>
<button class="text-neutral-500 hover:text-neutral-700 dark:text-neutral-400 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="flex flex-col md:flex-row h-full">
<!-- Left Column: Variant Selection -->
<div class="flex-1 p-6 md:p-8 border-b md:border-b-0 md:border-r border-neutral-200 dark:border-neutral-800">
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-neutral-300 mb-3">Room Visibility</label>
<div class="flex bg-neutral-100 dark:bg-[#2c2918] p-1.5 rounded-lg w-full max-w-sm">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="visibility" type="radio" value="public"/>
<div class="flex items-center justify-center py-2 px-4 rounded text-sm font-medium text-neutral-600 dark:text-neutral-400 peer-checked:bg-white dark:peer-checked:bg-primary peer-checked:text-slate-900 dark:peer-checked:text-background-dark shadow-sm transition-all duration-200">
<span class="material-symbols-outlined text-[18px] mr-2">public</span>
                                Public
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="visibility" type="radio" value="private"/>
<div class="flex items-center justify-center py-2 px-4 rounded text-sm font-medium text-neutral-600 dark:text-neutral-400 peer-checked:bg-white dark:peer-checked:bg-primary peer-checked:text-slate-900 dark:peer-checked:text-background-dark shadow-sm transition-all duration-200">
<span class="material-symbols-outlined text-[18px] mr-2">lock</span>
                                Private
                            </div>
</label>
</div>
</div>
<div class="mb-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-neutral-300 mb-4">Select Variant</label>
<div class="grid grid-cols-2 gap-4">
<!-- Standard Variant -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="variant" type="radio" value="standard"/>
<div class="p-4 rounded-xl border-2 border-transparent bg-neutral-50 dark:bg-[#232010] hover:bg-neutral-100 dark:hover:bg-[#2c2918] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all duration-200 h-full flex flex-col items-center text-center">
<div class="w-12 h-12 mb-3 rounded-full bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center text-neutral-600 dark:text-neutral-300 peer-checked:bg-primary peer-checked:text-background-dark">
<span class="material-symbols-outlined text-2xl">chess</span>
</div>
<h4 class="font-bold text-slate-900 dark:text-white mb-1">Standard</h4>
<p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">Classic FIDE rules chess.</p>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</label>
<!-- Atomic Variant -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="variant" type="radio" value="atomic"/>
<div class="p-4 rounded-xl border-2 border-transparent bg-neutral-50 dark:bg-[#232010] hover:bg-neutral-100 dark:hover:bg-[#2c2918] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all duration-200 h-full flex flex-col items-center text-center">
<div class="w-12 h-12 mb-3 rounded-full bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center text-neutral-600 dark:text-neutral-300 peer-checked:bg-primary peer-checked:text-background-dark">
<span class="material-symbols-outlined text-2xl">local_fire_department</span>
</div>
<h4 class="font-bold text-slate-900 dark:text-white mb-1">Atomic</h4>
<p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">Captures cause explosions around the square.</p>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</label>
<!-- Gravity Variant -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="variant" type="radio" value="gravity"/>
<div class="p-4 rounded-xl border-2 border-transparent bg-neutral-50 dark:bg-[#232010] hover:bg-neutral-100 dark:hover:bg-[#2c2918] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all duration-200 h-full flex flex-col items-center text-center">
<div class="w-12 h-12 mb-3 rounded-full bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center text-neutral-600 dark:text-neutral-300 peer-checked:bg-primary peer-checked:text-background-dark">
<span class="material-symbols-outlined text-2xl">arrow_downward</span>
</div>
<h4 class="font-bold text-slate-900 dark:text-white mb-1">Gravity</h4>
<p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">Pieces fall towards the bottom after moving.</p>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</label>
<!-- Odd Move Variant -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="variant" type="radio" value="oddmove"/>
<div class="p-4 rounded-xl border-2 border-transparent bg-neutral-50 dark:bg-[#232010] hover:bg-neutral-100 dark:hover:bg-[#2c2918] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 transition-all duration-200 h-full flex flex-col items-center text-center">
<div class="w-12 h-12 mb-3 rounded-full bg-neutral-200 dark:bg-neutral-800 flex items-center justify-center text-neutral-600 dark:text-neutral-300 peer-checked:bg-primary peer-checked:text-background-dark">
<span class="material-symbols-outlined text-2xl">cruelty_free</span>
</div>
<h4 class="font-bold text-slate-900 dark:text-white mb-1">Odd Move</h4>
<p class="text-xs text-neutral-500 dark:text-neutral-400 leading-relaxed">Knights move like Giraffes, Bishops like Zebras.</p>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</label>
</div>
</div>
</div>
<!-- Right Column: Settings -->
<div class="w-full md:w-[320px] bg-neutral-50 dark:bg-[#232010] p-6 flex flex-col">
<div class="flex-1 space-y-8">
<!-- Time Control -->
<div>
<div class="flex items-center justify-between mb-3">
<label class="text-sm font-semibold text-slate-700 dark:text-neutral-300 flex items-center gap-2">
<span class="material-symbols-outlined text-lg text-primary">timer</span>
                                Time Control
                            </label>
<span class="text-xs font-mono bg-neutral-200 dark:bg-neutral-800 px-2 py-0.5 rounded text-neutral-600 dark:text-neutral-300">Rapid</span>
</div>
<div class="space-y-4 px-1">
<div>
<div class="flex justify-between text-xs text-neutral-500 dark:text-neutral-400 mb-1">
<span>Minutes per side</span>
<span class="font-bold text-slate-900 dark:text-white">10 min</span>
</div>
<input class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-primary" max="60" min="1" type="range" value="10"/>
</div>
<div>
<div class="flex justify-between text-xs text-neutral-500 dark:text-neutral-400 mb-1">
<span>Increment (seconds)</span>
<span class="font-bold text-slate-900 dark:text-white">5 sec</span>
</div>
<input class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-primary" max="30" min="0" type="range" value="5"/>
</div>
</div>
<div class="mt-4 flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="flex-shrink-0 px-3 py-1.5 rounded-full border border-neutral-300 dark:border-neutral-700 text-xs font-medium text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors">1+0</button>
<button class="flex-shrink-0 px-3 py-1.5 rounded-full border border-neutral-300 dark:border-neutral-700 text-xs font-medium text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors">3+2</button>
<button class="flex-shrink-0 px-3 py-1.5 rounded-full border border-primary bg-primary/10 text-xs font-medium text-slate-900 dark:text-white">10+5</button>
<button class="flex-shrink-0 px-3 py-1.5 rounded-full border border-neutral-300 dark:border-neutral-700 text-xs font-medium text-neutral-600 dark:text-neutral-400 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors">30+0</button>
</div>
</div>
<!-- Color Preference -->
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-neutral-300 mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-lg text-primary">palette</span>
                            Side Preference
                        </label>
<div class="flex gap-3 justify-center">
<label class="cursor-pointer group">
<input class="sr-only peer" name="color" type="radio" value="white"/>
<div class="w-14 h-14 rounded-full bg-neutral-200 dark:bg-neutral-800 border-2 border-transparent peer-checked:border-primary flex items-center justify-center transition-all group-hover:scale-105">
<span class="material-symbols-outlined text-2xl text-slate-900 dark:text-white">circle</span>
</div>
<span class="block text-center text-xs mt-1 text-neutral-500 dark:text-neutral-400 font-medium">White</span>
</label>
<label class="cursor-pointer group">
<input checked="" class="sr-only peer" name="color" type="radio" value="random"/>
<div class="w-14 h-14 rounded-full bg-gradient-to-br from-neutral-200 to-neutral-800 dark:from-neutral-700 dark:to-neutral-900 border-2 border-transparent peer-checked:border-primary flex items-center justify-center transition-all group-hover:scale-105">
<span class="material-symbols-outlined text-2xl text-neutral-500 dark:text-neutral-400">shuffle</span>
</div>
<span class="block text-center text-xs mt-1 text-neutral-500 dark:text-neutral-400 font-medium">Random</span>
</label>
<label class="cursor-pointer group">
<input class="sr-only peer" name="color" type="radio" value="black"/>
<div class="w-14 h-14 rounded-full bg-slate-900 border-2 border-transparent peer-checked:border-primary flex items-center justify-center transition-all group-hover:scale-105">
<span class="material-symbols-outlined text-2xl text-white">circle</span>
</div>
<span class="block text-center text-xs mt-1 text-neutral-500 dark:text-neutral-400 font-medium">Black</span>
</label>
</div>
</div>
<!-- Rating Range -->
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-neutral-300 mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-lg text-primary">trending_up</span>
                            Rating Range
                        </label>
<div class="flex items-center gap-2 text-sm">
<input class="w-20 px-2 py-1 bg-neutral-100 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded text-center text-slate-900 dark:text-white focus:outline-none focus:border-primary" type="text" value="-500"/>
<span class="text-neutral-400">to</span>
<input class="w-20 px-2 py-1 bg-neutral-100 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded text-center text-slate-900 dark:text-white focus:outline-none focus:border-primary" type="text" value="+500"/>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="pt-6 mt-6 border-t border-neutral-200 dark:border-neutral-800">
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-[#d9ba0b] text-background-dark font-bold text-lg py-3 px-6 rounded-lg transition-colors shadow-lg shadow-primary/20">
                        Create Room
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-xs text-neutral-500 dark:text-neutral-500 mt-3">
                        24 players currently online in standard
                    </p>
</div>
</div>
</div>
</div>
</body></html>
